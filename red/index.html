<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VHeusden</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            background: #cc0000;
            overflow: hidden;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .logo svg {
            width: 420px;
            height: auto;
        }

        @media (max-width: 480px) {
            .logo svg {
                width: 280px;
            }
        }
    </style>
</head>
<body>
    <div class="logo">
        <svg viewBox="0 0 420 280" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="VHeusden logo">
            <g transform="translate(210, 75)">
                <polygon points="0,-52 52,0 0,0" fill="#609744"/>
                <polygon points="0,0 -52,0 0,-52" fill="#1e603f"/>
                <polygon points="52,0 0,52 0,0" fill="#155644"/>
                <polygon points="0,0 0,52 -52,0" fill="#034075"/>
                <line x1="-54" y1="0" x2="54" y2="0" stroke="#cc0000" stroke-width="3"/>
                <line x1="0" y1="-54" x2="0" y2="54" stroke="#cc0000" stroke-width="3"/>
            </g>
            <text x="210" y="195" text-anchor="middle" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-weight="800" font-size="62" letter-spacing="2">
                <tspan fill="#105045">VHEU</tspan><tspan fill="#024073">SDEN</tspan>
            </text>
        </svg>
    </div>
</body>
</html>

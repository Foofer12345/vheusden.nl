<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VHEUSDEN Energy Solutions — VHeusden</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            background: #f5f1eb;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .menu-toggle {
            position: fixed;
            top: 24px;
            right: 24px;
            z-index: 1000;
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
        }

        .menu-toggle span {
            display: block;
            width: 28px;
            height: 3px;
            margin: 5px 0;
            background: #1b5e4a;
            border-radius: 2px;
            transition: all 0.3s ease;
        }

        .menu-toggle.active span:nth-child(1) {
            transform: rotate(45deg) translate(5px, 6px);
        }

        .menu-toggle.active span:nth-child(2) {
            opacity: 0;
        }

        .menu-toggle.active span:nth-child(3) {
            transform: rotate(-45deg) translate(5px, -6px);
        }

        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(245, 241, 235, 0.97);
            z-index: 999;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        .menu-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .menu-overlay nav {
            text-align: center;
        }

        .menu-overlay nav a {
            display: block;
            font-size: 1.5rem;
            font-weight: 600;
            text-decoration: none;
            padding: 16px 0;
            letter-spacing: 0.05em;
            transition: color 0.3s ease, transform 0.3s ease;
            background: linear-gradient(135deg, #1b5e4a, #0d3b6e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .menu-overlay nav a:hover {
            transform: scale(1.05);
        }

        .menu-overlay nav a::after {
            content: '';
            display: block;
            width: 40px;
            height: 2px;
            margin: 12px auto 0;
            background: linear-gradient(135deg, #1b5e4a, #0d3b6e);
            opacity: 0.3;
        }

        .menu-overlay nav a:last-child::after {
            display: none;
        }

        .content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 0;
        }

        .content svg {
            width: 420px;
            height: auto;
        }

        .legal {
            flex-shrink: 0;
            padding: 12px 16px;
            text-align: center;
            font-size: 0.7rem;
            color: #1b5e4a;
            opacity: 0.5;
            letter-spacing: 0.03em;
        }

        @media (max-width: 480px) {
            .content svg {
                width: 280px;
            }
        }

        @media (max-width: 600px) {
            .menu-overlay nav a {
                font-size: 1.2rem;
                padding: 14px 0;
            }

            .menu-toggle {
                top: 16px;
                right: 16px;
            }
        }
    </style>
</head>
<body>
    <button class="menu-toggle" aria-label="Menu" onclick="toggleMenu()">
        <span></span>
        <span></span>
        <span></span>
    </button>

    <div class="menu-overlay" id="menuOverlay">
        <nav>
            <a href="/">Home</a>
            <a href="/interim">HEUS Interim Management</a>
            <a href="/energy">VHEUSDEN Energy Solutions</a>
            <a href="/family-office">VHEUSDEN Family Office</a>
            <a href="/contact">Contact</a>
        </nav>
    </div>

    <div class="content">
        <svg viewBox="0 0 420 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="VHEUSDEN Energy Solutions">
            <defs>
                <linearGradient id="swoosh-grad" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" stop-color="#1e603f"/>
                    <stop offset="100%" stop-color="#034075"/>
                </linearGradient>
            </defs>
            <!-- Diamond icon -->
            <g transform="translate(210, 70)">
                <polygon points="0,-52 52,0 0,0" fill="#609744"/>
                <polygon points="0,0 -52,0 0,-52" fill="#1e603f"/>
                <polygon points="52,0 0,52 0,0" fill="#155644"/>
                <polygon points="0,0 0,52 -52,0" fill="#034075"/>
                <line x1="-54" y1="0" x2="54" y2="0" stroke="#f5f1eb" stroke-width="3"/>
                <line x1="0" y1="-54" x2="0" y2="54" stroke="#f5f1eb" stroke-width="3"/>
            </g>
            <!-- Text VHEUSDEN -->
            <text x="210" y="190" text-anchor="middle" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-weight="800" font-size="52" letter-spacing="2">
                <tspan fill="#105045">VHEU</tspan><tspan fill="#024073">SDEN</tspan>
            </text>
            <!-- Subtitle -->
            <text x="210" y="218" text-anchor="middle" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-weight="400" font-size="18" fill="#555" letter-spacing="1">Energy Solutions</text>
            <!-- Electric bolt -->
            <polyline points="120,238 170,228 185,248 220,225 235,245 270,222 300,238" fill="none" stroke="url(#swoosh-grad)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
        </svg>
    </div>

    <p class="legal">&copy; 2026 VHeusden &mdash; All rights reserved.</p>

    <script>
        function toggleMenu() {
            document.querySelector('.menu-toggle').classList.toggle('active');
            document.getElementById('menuOverlay').classList.toggle('active');
        }
    </script>
</body>
</html>

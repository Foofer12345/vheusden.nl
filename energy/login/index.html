<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — VHEUSDEN Energy Solutions</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            background: #f5f1eb;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        body {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Hamburger menu */
        .menu-toggle {
            position: fixed;
            top: 24px;
            right: 24px;
            z-index: 1000;
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
        }

        .menu-toggle span {
            display: block;
            width: 28px;
            height: 3px;
            margin: 5px 0;
            background: #1b5e4a;
            border-radius: 2px;
            transition: all 0.3s ease;
        }

        .menu-toggle.active span:nth-child(1) {
            transform: rotate(45deg) translate(5px, 6px);
        }

        .menu-toggle.active span:nth-child(2) {
            opacity: 0;
        }

        .menu-toggle.active span:nth-child(3) {
            transform: rotate(-45deg) translate(5px, -6px);
        }

        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(245, 241, 235, 0.97);
            z-index: 999;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        .menu-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .menu-overlay nav {
            text-align: center;
        }

        .menu-overlay nav a {
            display: block;
            font-size: 1.5rem;
            font-weight: 600;
            text-decoration: none;
            padding: 16px 0;
            letter-spacing: 0.05em;
            transition: color 0.3s ease, transform 0.3s ease;
            background: linear-gradient(135deg, #1b5e4a, #0d3b6e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .menu-overlay nav a:hover {
            transform: scale(1.05);
        }

        .menu-overlay nav a::after {
            content: '';
            display: block;
            width: 40px;
            height: 2px;
            margin: 12px auto 0;
            background: linear-gradient(135deg, #1b5e4a, #0d3b6e);
            opacity: 0.3;
        }

        .menu-overlay nav a:last-child::after {
            display: none;
        }

        /* Main layout */
        .main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            gap: 60px;
        }

        /* Left: illustrations */
        .illustrations {
            flex: 1;
            max-width: 55%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: auto auto auto;
            gap: 24px;
            align-items: center;
            justify-items: center;
        }

        .illustrations svg {
            width: 100%;
            max-width: 200px;
            height: auto;
            opacity: 0.6;
            transition: opacity 0.3s ease;
        }

        .illustrations svg:hover {
            opacity: 0.9;
        }

        .illust-wide {
            grid-column: 1 / -1;
        }

        /* Right: login card */
        .login-card {
            flex: 0 0 360px;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(27, 94, 74, 0.1);
            border-radius: 16px;
            padding: 48px 36px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            backdrop-filter: blur(10px);
        }

        .login-logo svg {
            width: 180px;
            height: auto;
        }

        .login-heading {
            font-size: 1.4rem;
            font-weight: 600;
            letter-spacing: 0.03em;
            background: linear-gradient(135deg, #105045, #024073);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .login-form {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-group label {
            font-size: 0.75rem;
            font-weight: 600;
            color: #1b5e4a;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .form-group input {
            padding: 12px 16px;
            border: 1.5px solid rgba(27, 94, 74, 0.2);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.6);
            font-family: inherit;
            font-size: 0.95rem;
            color: #1b5e4a;
            outline: none;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .form-group input:focus {
            border-color: #1b5e4a;
            box-shadow: 0 0 0 3px rgba(27, 94, 74, 0.1);
        }

        .form-group input::placeholder {
            color: rgba(27, 94, 74, 0.35);
        }

        .sign-in-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #1e603f, #034075);
            color: #fff;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .sign-in-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(30, 96, 63, 0.25);
        }

        .forgot-link {
            font-size: 0.8rem;
            color: #1b5e4a;
            opacity: 0.5;
            text-decoration: none;
            transition: opacity 0.3s ease;
            text-align: center;
        }

        .forgot-link:hover {
            opacity: 0.8;
        }

        /* Footer */
        .legal {
            flex-shrink: 0;
            padding: 12px 16px;
            text-align: center;
            font-size: 0.7rem;
            color: #1b5e4a;
            opacity: 0.5;
            letter-spacing: 0.03em;
        }

        /* Responsive */
        @media (max-width: 900px) {
            .main {
                flex-direction: column;
                padding: 24px;
                gap: 24px;
            }

            .illustrations {
                display: none;
            }

            .login-card {
                flex: none;
                width: 100%;
                max-width: 400px;
            }
        }

        @media (max-width: 600px) {
            .menu-overlay nav a {
                font-size: 1.2rem;
                padding: 14px 0;
            }

            .menu-toggle {
                top: 16px;
                right: 16px;
            }

            .login-card {
                padding: 36px 24px;
            }
        }
    </style>
</head>
<body>
    <button class="menu-toggle" aria-label="Menu" onclick="toggleMenu()">
        <span></span>
        <span></span>
        <span></span>
    </button>

    <div class="menu-overlay" id="menuOverlay">
        <nav>
            <a href="/">Home</a>
            <a href="/interim">HEUS Interim Management</a>
            <a href="/energy">VHEUSDEN Energy Solutions</a>

                <line x1="160" y1="52" x2="160" y2="58" stroke="#609744" stroke-width="1.5" stroke-linecap="round"/>

            </svg>

            <!-- EV Charging -->
            <svg viewBox="0 0 200 160" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#1e603f"/>
                        <stop offset="100%" stop-color="#034075"/>
                    </linearGradient>
                </defs>
                <!-- Charging station -->

            </svg>

            <!-- Battery -->
            <svg viewBox="0 0 200 160" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="grad4" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#1e603f"/>
                        <stop offset="100%" stop-color="#034075"/>
                    </linearGradient>
                    <linearGradient id="charge" x1="0%" y1="100%" x2="0%" y2="0%">
                        <stop offset="0%" stop-color="#609744"/>
                        <stop offset="75%" stop-color="#609744"/>

                </defs>

                <rect x="55" y="30" width="90" height="95" rx="8" fill="none" stroke="url(#grad4)" stroke-width="2"/>

                <path d="M340,48 L340,60 L350,60" fill="none" stroke="#609744" stroke-width="1.5" stroke-linecap="round"/>
                <!-- Pipe connection -->
                <line x1="310" y1="45" x2="322" y2="45" stroke="url(#grad5)" stroke-width="1.5"/>
                <line x1="310" y1="75" x2="322" y2="75" stroke="url(#grad5)" stroke-width="1.5"/>
                <text x="210" y="115" font-family="'Segoe UI', sans-serif" font-size="10" fill="#1b5e4a" opacity="0.6" text-anchor="middle">Heating Solutions</text>
            </svg>

        </div>

        <!-- Right: Login card -->
        <div class="login-card">
            <!-- Small logo -->
            <div class="login-logo">
                <svg viewBox="0 0 180 120" xmlns="http://www.w3.org/2000/svg">
                    <g transform="translate(90, 30)">
                        <polygon points="0,-22 22,0 0,0" fill="#609744"/>
                        <polygon points="0,0 -22,0 0,-22" fill="#1e603f"/>
                        <polygon points="22,0 0,22 0,0" fill="#155644"/>

                        <line x1="0" y1="-23" x2="0" y2="23" stroke="#f5f1eb" stroke-width="1.5"/>
                    </g>
                    <text x="90" y="78" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-weight="800" font-size="22" letter-spacing="1">
                        <tspan fill="#105045">VHEU</tspan><tspan fill="#024073">SDEN</tspan>

                    <text x="90" y="95" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-weight="400" font-size="9" fill="#555" letter-spacing="0.5">Energy Solutions</text>

            <h2 class="login-heading">Welcome back</h2>

            <form class="login-form" onsubmit="event.preventDefault();">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="you@company.com" autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password">
                </div>
                <button type="submit" class="sign-in-btn">Sign In</button>
            </form>

            <a href="#" class="forgot-link" onclick="event.preventDefault();">Forgot password?</a>
        </div>
    </div>

    <p class="legal">&copy; 2026 VHeusden &mdash; All rights reserved.</p>

    <script>
        function toggleMenu() {
            document.querySelector('.menu-toggle').classList.toggle('active');
            document.getElementById('menuOverlay').classList.toggle('active');
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — VHEUSDEN Energy Solutions</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            background: #f5f1eb;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        body {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Hamburger menu */
        .menu-toggle {
            position: fixed;
            top: 24px;
            right: 24px;
            z-index: 1000;
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
        }

        .menu-toggle span {
            display: block;
            width: 28px;
            height: 3px;
            margin: 5px 0;
            background: #1b5e4a;
            border-radius: 2px;
            transition: all 0.3s ease;
        }

        .menu-toggle.active span:nth-child(1) {
            transform: rotate(45deg) translate(5px, 6px);
        }

        .menu-toggle.active span:nth-child(2) {
            opacity: 0;
        }

        .menu-toggle.active span:nth-child(3) {
            transform: rotate(-45deg) translate(5px, -6px);
        }

        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(245, 241, 235, 0.97);
            z-index: 999;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        .menu-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .menu-overlay nav {
            text-align: center;
        }

        .menu-overlay nav a {
            display: block;
            font-size: 1.5rem;
            font-weight: 600;
            text-decoration: none;
            padding: 16px 0;
            letter-spacing: 0.05em;
            transition: color 0.3s ease, transform 0.3s ease;
            background: linear-gradient(135deg, #1b5e4a, #0d3b6e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .menu-overlay nav a:hover {
            transform: scale(1.05);
        }

        .menu-overlay nav a::after {
            content: '';
            display: block;
            width: 40px;
            height: 2px;
            margin: 12px auto 0;
            background: linear-gradient(135deg, #1b5e4a, #0d3b6e);
            opacity: 0.3;
        }

        .menu-overlay nav a:last-child::after {
            display: none;
        }

        /* Main layout - centered */
        .main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* Floating illustrations around the login */
        .illust {
            position: absolute;
            opacity: 0.12;
            transition: opacity 0.5s ease;
        }

        .illust:hover {
            opacity: 0.45;
        }

        .illust-1 { top: 3%; left: 2%; width: 240px; }
        .illust-2 { top: 1%; right: 3%; width: 220px; }
        .illust-3 { bottom: 5%; left: 3%; width: 230px; }
        .illust-4 { bottom: 3%; right: 2%; width: 240px; }
        .illust-5 { top: 42%; left: 0%; width: 190px; transform: translateY(-50%); }
        .illust-6 { top: 38%; right: 0%; width: 200px; transform: translateY(-50%); }

        /* Login card - centered */
        .login-card {
            position: relative;
            z-index: 10;
            width: 400px;
            max-width: 92vw;
            background: rgba(255, 255, 255, 0.55);
            border: 1px solid rgba(27, 94, 74, 0.08);
            border-radius: 20px;
            padding: 40px 36px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            backdrop-filter: blur(16px);
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.04);
        }

        .login-logo svg {
            width: 160px;
            height: auto;
        }

        .login-heading {
            font-size: 1.3rem;
            font-weight: 600;
            letter-spacing: 0.03em;
            background: linear-gradient(135deg, #105045, #024073);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* SSO buttons */
        .sso-buttons {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .sso-btn {
            width: 100%;
            padding: 11px 16px;
            border: 1.5px solid rgba(27, 94, 74, 0.15);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.7);
            font-family: inherit;
            font-size: 0.9rem;
            font-weight: 500;
            color: #333;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: border-color 0.3s ease, background 0.3s ease, transform 0.2s ease;
        }

        .sso-btn:hover {
            border-color: rgba(27, 94, 74, 0.3);
            background: rgba(255, 255, 255, 0.9);
            transform: translateY(-1px);
        }

        .sso-btn svg {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
        }

        /* Divider */
        .divider {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(27, 94, 74, 0.15);
        }

        .divider span {
            font-size: 0.75rem;
            color: #1b5e4a;
            opacity: 0.5;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            white-space: nowrap;
        }

        /* Form */
        .login-form {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .form-group label {
            font-size: 0.72rem;
            font-weight: 600;
            color: #1b5e4a;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .form-group input {
            padding: 11px 14px;
            border: 1.5px solid rgba(27, 94, 74, 0.18);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.6);
            font-family: inherit;
            font-size: 0.9rem;
            color: #1b5e4a;
            outline: none;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .form-group input:focus {
            border-color: #1b5e4a;
            box-shadow: 0 0 0 3px rgba(27, 94, 74, 0.08);
        }

        .form-group input::placeholder {
            color: rgba(27, 94, 74, 0.3);
        }

        .sign-in-btn {
            width: 100%;
            padding: 13px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #1e603f, #034075);
            color: #fff;
            font-family: inherit;
            font-size: 0.95rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .sign-in-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(30, 96, 63, 0.25);
        }

        .bottom-links {
            display: flex;
            justify-content: space-between;
            width: 100%;
        }

        .bottom-links a {
            font-size: 0.78rem;
            color: #1b5e4a;
            opacity: 0.5;
            text-decoration: none;
            transition: opacity 0.3s ease;
        }

        .bottom-links a:hover {
            opacity: 0.8;
        }

        /* Footer */
        .legal {
            flex-shrink: 0;
            padding: 12px 16px;
            text-align: center;
            font-size: 0.7rem;
            color: #1b5e4a;
            opacity: 0.5;
            letter-spacing: 0.03em;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .illust {
                opacity: 0.06;
            }

            .illust-5, .illust-6 {
                display: none;
            }

            .login-card {
                padding: 32px 24px;
                gap: 16px;
            }

            .menu-overlay nav a {
                font-size: 1.2rem;
                padding: 14px 0;
            }

            .menu-toggle {
                top: 16px;
                right: 16px;
            }
        }
    </style>
</head>

            <path d="M95,38 Q98,26 101,38" fill="none" stroke="#609744" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
            <path d="M110,42 Q113,32 116,42" fill="none" stroke="#609744" stroke-width="1.5" stroke-linecap="round"/>

            <circle cx="80" cy="80" r="12" fill="none" stroke="#609744" stroke-width="1.2" opacity="0.3"/>

        </svg>

        <!-- Power grid / transmission (middle-right) -->
        <svg class="illust illust-6" viewBox="0 0 160 180" xmlns="http://www.w3.org/2000/svg">
            <defs><linearGradient id="g6" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#155644"/><stop offset="100%" stop-color="#034075"/></linearGradient></defs>
            <!-- Transmission tower -->
            <line x1="80" y1="15" x2="68" y2="160" stroke="url(#g6)" stroke-width="2"/>
            <line x1="80" y1="15" x2="92" y2="160" stroke="url(#g6)" stroke-width="2"/>
            <!-- Cross beams -->
            <line x1="72" y1="50" x2="88" y2="50" stroke="url(#g6)" stroke-width="1.5"/>
            <line x1="70" y1="80" x2="90" y2="80" stroke="url(#g6)" stroke-width="1.5"/>
            <line x1="69" y1="110" x2="91" y2="110" stroke="url(#g6)" stroke-width="1.5"/>
            <!-- Arms -->
            <line x1="72" y1="50" x2="50" y2="45" stroke="url(#g6)" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="88" y1="50" x2="110" y2="45" stroke="url(#g6)" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="70" y1="80" x2="52" y2="76" stroke="url(#g6)" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="90" y1="80" x2="108" y2="76" stroke="url(#g6)" stroke-width="1.5" stroke-linecap="round"/>
            <!-- Insulators -->
            <circle cx="50" cy="45" r="2" fill="#609744" opacity="0.6"/>
            <circle cx="110" cy="45" r="2" fill="#609744" opacity="0.6"/>
            <circle cx="52" cy="76" r="2" fill="#609744" opacity="0.6"/>
            <circle cx="108" cy="76" r="2" fill="#609744" opacity="0.6"/>
            <!-- Power lines going out -->
            <path d="M10,50 Q30,42 50,45" fill="none" stroke="url(#g6)" stroke-width="1" opacity="0.4"/>
            <path d="M110,45 Q130,42 150,50" fill="none" stroke="url(#g6)" stroke-width="1" opacity="0.4"/>
            <path d="M10,80 Q30,73 52,76" fill="none" stroke="url(#g6)" stroke-width="1" opacity="0.4"/>
            <path d="M108,76 Q130,73 150,80" fill="none" stroke="url(#g6)" stroke-width="1" opacity="0.4"/>
            <!-- Lightning bolt (energy flow) -->
            <path d="M76,20 L73,28 L79,28 L75,38" fill="none" stroke="#609744" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
        </svg>

        <!-- Login card (centered) -->
        <div class="login-card">
            <div class="login-logo">
                <svg viewBox="0 0 160 105" xmlns="http://www.w3.org/2000/svg">
                    <g transform="translate(80, 28)">
                        <polygon points="0,-20 20,0 0,0" fill="#609744"/>
                        <polygon points="0,0 -20,0 0,-20" fill="#1e603f"/>
                        <polygon points="20,0 0,20 0,0" fill="#155644"/>
                        <polygon points="0,0 0,20 -20,0" fill="#034075"/>
                        <line x1="-21" y1="0" x2="21" y2="0" stroke="#f5f1eb" stroke-width="1.5"/>
                        <line x1="0" y1="-21" x2="0" y2="21" stroke="#f5f1eb" stroke-width="1.5"/>
                    </g>
                    <text x="80" y="72" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-weight="800" font-size="20" letter-spacing="1">
                        <tspan fill="#105045">VHEU</tspan><tspan fill="#024073">SDEN</tspan>
                    </text>
                    <text x="80" y="88" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-weight="400" font-size="8.5" fill="#555" letter-spacing="0.5">Energy Solutions</text>
                </svg>
            </div>

            <h2 class="login-heading">Welcome back</h2>

            <form class="login-form" onsubmit="event.preventDefault();">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="you@company.com" autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password">
                </div>
                <button type="submit" class="sign-in-btn">Sign In</button>
            </form>

            <div class="bottom-links">
                <a href="#" onclick="event.preventDefault();">Forgot password?</a>
                <a href="#" onclick="event.preventDefault();">Create account</a>
            </div>

            <div class="divider"><span>or</span></div>

            <!-- SSO Buttons -->
            <div class="sso-buttons">
                <button class="sso-btn" onclick="event.preventDefault();">
                    <!-- Microsoft icon -->
                    <svg viewBox="0 0 21 21" xmlns="http://www.w3.org/2000/svg">
                        <rect x="1" y="1" width="9" height="9" fill="#f25022"/>
                        <rect x="11" y="1" width="9" height="9" fill="#7fba00"/>
                        <rect x="1" y="11" width="9" height="9" fill="#00a4ef"/>
                        <rect x="11" y="11" width="9" height="9" fill="#ffb900"/>
                    </svg>
                    Continue with Microsoft
                </button>
                <button class="sso-btn" onclick="event.preventDefault();">
                    <!-- Google icon -->
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
                        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18A10.96 10.96 0 001 12c0 1.77.42 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
                        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                    </svg>
                    Continue with Google
                </button>
            </div>
        </div>
    </div>

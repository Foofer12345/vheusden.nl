<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VHeusden</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #f5f1eb;

            max-height: 90vh;
            object-fit: contain;
        }
    </style>
</head>
<body>
    <img src="logo.png" alt="VHeusden logo">

</html>

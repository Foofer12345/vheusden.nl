<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact — VHeusden</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            background: #f5f1eb;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .menu-toggle {
            position: fixed;
            top: 24px;
            right: 24px;
            z-index: 1000;
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
        }

        .menu-toggle span {
            display: block;
            width: 28px;
            height: 3px;
            margin: 5px 0;
            background: #1b5e4a;
            border-radius: 2px;
            transition: all 0.3s ease;
        }

        .menu-toggle.active span:nth-child(1) {
            transform: rotate(45deg) translate(5px, 6px);
        }

        .menu-toggle.active span:nth-child(2) {
            opacity: 0;
        }

        .menu-toggle.active span:nth-child(3) {
            transform: rotate(-45deg) translate(5px, -6px);
        }

        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(245, 241, 235, 0.97);
            z-index: 999;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        .menu-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .menu-overlay nav {
            text-align: center;
        }

        .menu-overlay nav a {
            display: block;
            font-size: 1.5rem;
            font-weight: 600;
            text-decoration: none;
            padding: 16px 0;
            letter-spacing: 0.05em;
            transition: color 0.3s ease, transform 0.3s ease;
            background: linear-gradient(135deg, #1b5e4a, #0d3b6e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .menu-overlay nav a:hover {
            transform: scale(1.05);
        }

        .menu-overlay nav a::after {
            content: '';
            display: block;
            width: 40px;
            height: 2px;
            margin: 12px auto 0;
            background: linear-gradient(135deg, #1b5e4a, #0d3b6e);
            opacity: 0.3;
        }

        .menu-overlay nav a:last-child::after {
            display: none;
        }

        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 0;
            gap: 32px;
        }

        .contact-name {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            background: linear-gradient(135deg, #105045, #024073);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .contact-links {
            display: flex;
            gap: 40px;
            align-items: center;
        }

        .contact-links a {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            transition: transform 0.3s ease, opacity 0.3s ease;
            opacity: 0.7;
        }

        .contact-links a:hover {
            transform: translateY(-4px);
            opacity: 1;
        }

        .contact-links a svg {
            width: 36px;
            height: 36px;
        }

        .contact-links a .icon-label {
            font-size: 0.7rem;
            font-weight: 500;
            letter-spacing: 0.05em;
            color: #1b5e4a;
            text-transform: uppercase;
        }

        .legal {
            flex-shrink: 0;
            padding: 12px 16px;
            text-align: center;
            font-size: 0.7rem;
            color: #1b5e4a;
            opacity: 0.5;
            letter-spacing: 0.03em;
        }

        @media (max-width: 600px) {
            .contact-name {
                font-size: 1.5rem;
            }

            .contact-links {
                gap: 28px;
            }

            .contact-links a svg {
                width: 30px;
                height: 30px;
            }

            .menu-overlay nav a {
                font-size: 1.2rem;
                padding: 14px 0;
            }

            .menu-toggle {
                top: 16px;
                right: 16px;
            }
        }
    </style>
</head>
<body>
    <button class="menu-toggle" aria-label="Menu" onclick="toggleMenu()">
        <span></span>
        <span></span>
        <span></span>
    </button>

    <div class="menu-overlay" id="menuOverlay">
        <nav>
            <a href="/">Home</a>
            <a href="/interim">HEUS Interim Management</a>
            <a href="/energy">VHEUSDEN Energy Solutions</a>
            <a href="/contact">Contact</a>
        </nav>
    </div>

    <div class="content">
        <h1 class="contact-name">Michiel van Heusden</h1>

        <div class="contact-links">
            <!-- Email icon -->
            <a href="mailto:michiel@vheusden.nl" aria-label="Email">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect x="2" y="4" width="20" height="16" rx="2" stroke="#1b5e4a" stroke-width="1.5"/>
                    <path d="M2 7l10 7 10-7" stroke="#1b5e4a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <span class="icon-label">Email</span>
            </a>

            <!-- LinkedIn icon -->
            <a href="https://www.linkedin.com/in/michielvheusden" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect x="2" y="2" width="20" height="20" rx="4" stroke="#1b5e4a" stroke-width="1.5"/>
                    <path d="M7 10v7M7 7v.01M11 17v-4.5a2.5 2.5 0 015 0V17M11 10v7" stroke="#1b5e4a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <span class="icon-label">LinkedIn</span>
            </a>

            <!-- Phone icon -->
            <a href="tel:+31621391981" aria-label="Telefoon">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M5 4h4l2 5-2.5 1.5a11 11 0 005 5L15 13l5 2v4a2 2 0 01-2 2A16 16 0 013 6a2 2 0 012-2z" stroke="#1b5e4a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <span class="icon-label">Bel mij</span>
            </a>
        </div>
    </div>

    <p class="legal">&copy; 2026 VHeusden &mdash; All rights reserved.</p>

    <script>
        function toggleMenu() {
            document.querySelector('.menu-toggle').classList.toggle('active');
            document.getElementById('menuOverlay').classList.toggle('active');
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEUS Interim Management — VHeusden</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            background: #fdf9f8;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .menu-toggle {
            position: fixed;
            top: 24px;
            right: 24px;
            z-index: 1000;
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
        }

        .menu-toggle span {
            display: block;
            width: 28px;
            height: 3px;
            margin: 5px 0;
            background: #1b5e4a;
            border-radius: 2px;
            transition: all 0.3s ease;
        }

        .menu-toggle.active span:nth-child(1) {
            transform: rotate(45deg) translate(5px, 6px);
        }

        .menu-toggle.active span:nth-child(2) {
            opacity: 0;
        }

        .menu-toggle.active span:nth-child(3) {
            transform: rotate(-45deg) translate(5px, -6px);
        }

        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(253, 249, 248, 0.97);
            z-index: 999;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        .menu-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .menu-overlay nav {
            text-align: center;
        }

        .menu-overlay nav a {
            display: block;
            font-size: 1.5rem;
            font-weight: 600;
            text-decoration: none;
            padding: 16px 0;
            letter-spacing: 0.05em;
            transition: color 0.3s ease, transform 0.3s ease;
            background: linear-gradient(135deg, #1b5e4a, #0d3b6e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .menu-overlay nav a:hover {
            transform: scale(1.05);
        }

        .menu-overlay nav a::after {
            content: '';
            display: block;
            width: 40px;
            height: 2px;
            margin: 12px auto 0;
            background: linear-gradient(135deg, #1b5e4a, #0d3b6e);
            opacity: 0.3;
        }

        .menu-overlay nav a:last-child::after {
            display: none;
        }

        .content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 0;
        }

        .content img {
            width: 100vw;
            height: 100%;
            object-fit: cover;
        }

        .legal {
            flex-shrink: 0;
            padding: 12px 16px;
            text-align: center;
            font-size: 0.7rem;
            color: #1b5e4a;
            opacity: 0.5;
            letter-spacing: 0.03em;
        }

        @media (max-width: 600px) {
            .menu-overlay nav a {
                font-size: 1.2rem;
                padding: 14px 0;
            }

            .menu-toggle {
                top: 16px;
                right: 16px;
            }
        }
    </style>
</head>
<body>
    <button class="menu-toggle" aria-label="Menu" onclick="toggleMenu()">
        <span></span>
        <span></span>
        <span></span>
    </button>

    <div class="menu-overlay" id="menuOverlay">
        <nav>
            <a href="/">Home</a>
            <a href="/interim">HEUS Interim Management</a>
            <a href="/energy">VHEUSDEN Energy Solutions</a>
            <a href="/family-office">VHEUSDEN Family Office</a>
            <a href="/contact">Contact</a>
        </nav>
    </div>

    <div class="content">
        <img src="Interim.png" alt="HEUS Interim Management">
    </div>

    <p class="legal">&copy; 2025 VHeusden &mdash; All rights reserved.</p>

    <script>
        function toggleMenu() {
            document.querySelector('.menu-toggle').classList.toggle('active');
            document.getElementById('menuOverlay').classList.toggle('active');
        }
    </script>
</body>
</html>
